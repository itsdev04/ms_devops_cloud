services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: cart_order_service
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/cart_order_service