spring:
  application:
    name: devworks-product-service
  datasource:
    url: jdbc:postgresql://localhost:5432/product_service
    username: dev
    password:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
