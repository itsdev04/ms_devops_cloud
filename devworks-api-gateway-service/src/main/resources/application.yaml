spring:
  application:
    name: devworks-api-gateway-service

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      access: READ_ONLY

product:
  service:
    id: lb://DEVWORKS-PRODUCT-SERVICE
cartorder:
  service:
    id: lb://DEVWORKS-CART-ORDER-SERVICE
